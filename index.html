<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BarScan</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@zxing/library@0.21.1/umd/index.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>

  <div class="app">

    <!-- Header -->
    <header class="app-header">
      <h1>BarScan</h1>
      <p class="subtitle">Barcode &amp; QR Scanner</p>
    </header>

    <!-- Setup panel -->
    <section class="card setup-card">
      <label class="field-label" for="camera-select">Camera</label>
      <div class="select-wrap">
        <select id="camera-select">
          <option value="">Detecting cameras…</option>
        </select>
        <svg class="select-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 6l4 4 4-4"/>
        </svg>
      </div>

      <button class="btn-start" id="start-btn">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5 3.5l8 4.5-8 4.5V3.5z"/></svg>
        Start Scanning
      </button>
    </section>

    <!-- Viewfinder -->
    <section class="card viewfinder-card" id="viewfinder-card" hidden>
      <div class="video-container">
        <video id="preview" playsinline muted autoplay></video>
        <div class="finder-overlay" aria-hidden="true">
          <div class="finder-box">
            <span class="corner tl"></span>
            <span class="corner tr"></span>
            <span class="corner bl"></span>
            <span class="corner br"></span>
          </div>
        </div>
        <div class="live-badge">
          <span class="live-dot"></span>
          LIVE
        </div>
      </div>

      <button class="btn-stop" id="stop-btn">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><rect x="3" y="3" width="10" height="10" rx="1.5"/></svg>
        Stop
      </button>
    </section>

    <!-- Results -->
    <section class="results-section">
      <div class="results-header">
        <span class="results-title">Results <span class="results-count" id="results-count">0</span></span>
        <button class="clear-btn" id="clear-btn">Clear</button>
      </div>

      <div id="results-list" class="results-list">
        <div class="empty-hint" id="empty-hint">
          Scan results will appear here.
        </div>
      </div>
    </section>

  </div>

</body>
</html>
